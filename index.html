<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Магия Виктории">
<title>Магия Виктории</title>
<style>
:root {
  --bg:#F5F0E8;--surface:#FFFFFF;--surface2:#F0EBE1;
  --text:#2A2320;--text2:#7A6E68;
  --accent:#C85A2A;--accent-light:#F5DDD0;
  --green:#2E7D5A;--green-light:#D4EDE2;
  --amber:#C47A1A;--red:#C0362A;
  --border:rgba(42,35,32,0.1);--radius:18px;--radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
.header{background:var(--accent);color:#FFF;padding:calc(52px + env(safe-area-inset-top,0px)) 20px 20px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between}
.header h1{font-size:26px;font-weight:800;letter-spacing:-0.5px}
.header .date{font-size:14px;opacity:0.8;margin-top:2px;font-weight:600}
.reset-day-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;margin-top:2px}
.reset-day-btn:active{opacity:0.7}
.add-wrap{padding:16px 16px 0}
.add-card{background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:0 2px 12px rgba(42,35,32,0.07)}
.add-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.add-row{display:flex;gap:8px;align-items:center}
.add-row input[type=text]{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:inherit;font-size:15px;font-weight:600;background:var(--surface2);color:var(--text);outline:none}
.add-row input[type=text]:focus{border-color:var(--accent)}
.qty-control{display:flex;align-items:center}
.qty-btn{width:32px;height:36px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.qty-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.qty-btn:active{background:var(--accent-light)}
.qty-val{width:36px;height:36px;border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);border-left:none;border-right:none;background:var(--surface2);text-align:center;font-family:inherit;font-size:15px;font-weight:800;color:var(--text);outline:none}
.add-submit{width:42px;height:36px;border-radius:var(--radius-sm);background:var(--accent);border:none;color:#fff;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-submit:active{opacity:0.8}
.list-wrap{padding:14px 16px}
.list-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:15px;font-weight:600;background:var(--surface);border-radius:var(--radius)}
.empty-icon{font-size:40px;margin-bottom:8px}
.dish-card{background:var(--surface);border-radius:var(--radius);padding:14px 14px 12px;margin-bottom:10px;box-shadow:0 2px 10px rgba(42,35,32,0.06)}
.dish-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dish-name{font-size:16px;font-weight:700;color:var(--text);flex:1}
.dish-del{background:none;border:none;font-size:16px;color:var(--text2);cursor:pointer;padding:2px 4px;line-height:1}
.dish-middle{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.portions-info{display:flex;align-items:baseline;gap:4px}
.p-left{font-size:36px;font-weight:800;line-height:1}
.p-sep{font-size:16px;color:var(--text2)}
.p-total{font-size:16px;font-weight:700;color:var(--text2)}
.p-word{font-size:12px;font-weight:600;color:var(--text2);margin-left:2px}
.btns{display:flex;gap:6px}
.spend-btn{height:44px;border-radius:22px;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:800}
.spend-btn:active{transform:scale(0.92);opacity:0.8}
.btn-minus1{width:44px;background:var(--accent-light);color:var(--accent)}
.btn-minus2{width:52px;background:var(--accent-light);color:var(--accent);font-size:13px}
.btn-plus1{width:44px;background:var(--green-light);color:var(--green)}
.btn-plus5{width:52px;background:var(--green-light);color:var(--green);font-size:13px}
.bar-wrap{height:5px;background:var(--surface2);border-radius:3px;margin-top:8px;overflow:hidden}
.bar{height:5px;border-radius:3px;transition:width 0.3s ease}
.bar.g{background:var(--green)}.bar.a{background:var(--amber)}.bar.r{background:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(42,35,32,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:420px;transform:translateY(20px);transition:transform 0.2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;text-align:center}
.modal-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px}
.modal-btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:center}
.modal-btn:active{opacity:0.8}
.modal-btn.green{background:var(--green-light);color:var(--green)}
.modal-btn.red{background:#FAE0DC;color:var(--red)}
.modal-btn.gray{background:var(--surface2);color:var(--text2)}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#F5F0E8;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:700;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(42,35,32,0.25);z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🍽 Магия Виктории</h1>
      <div class="date" id="dateLabel"></div>
    </div>
    <button class="reset-day-btn" onclick="showNewDayModal()">Новый день</button>
  </div>
</div>

<div class="add-wrap">
  <div class="add-card">
    <div class="add-label">Добавить блюдо</div>
    <div class="add-row">
      <input type="text" id="dishName" placeholder="Название блюда" maxlength="40" />
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-val" type="number" id="dishQty" value="1" min="1" max="99" readonly />
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <button class="add-submit" onclick="addDish()">+</button>
    </div>
  </div>
</div>

<div class="list-wrap">
  <div class="list-label">Остатки на сегодня</div>
  <div id="dishList"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">☀️ Новый день</div>
    <div class="modal-sub">Что делаем с меню?</div>
    <button class="modal-btn green" onclick="newDayKeep()">🔄 Оставить меню и порции как есть</button>
    <button class="modal-btn red" onclick="newDayReset()">⬜ Оставить меню — обнулить порции</button>
    <button class="modal-btn red" onclick="newDayClear()">🗑 Очистить всё — начать с нуля</button>
    <button class="modal-btn gray" onclick="hideModal()">Отмена</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let dishes = JSON.parse(localStorage.getItem('kitchen_v2') || '[]');
function save(){localStorage.setItem('kitchen_v2',JSON.stringify(dishes))}

const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const days=['вс','пн','вт','ср','чт','пт','сб'];
const d=new Date();
document.getElementById('dateLabel').textContent=days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()];

function changeQty(delta){
  const inp=document.getElementById('dishQty');
  inp.value=Math.max(1,Math.min(99,parseInt(inp.value)+delta));
}
function addDish(){
  const name=document.getElementById('dishName').value.trim();
  const qty=parseInt(document.getElementById('dishQty').value)||1;
  if(!name){showToast('Введите название блюда');return}
  dishes.push({name,total:qty,left:qty});
  document.getElementById('dishName').value='';
  document.getElementById('dishQty').value='1';
  save();render();
}
function spend(i,n){
  dishes[i].left=Math.max(0,dishes[i].left-n);
  if(dishes[i].left===0)showToast(dishes[i].name+' — закончилось 🚫');
  save();render();
}
function restore(i,n){
  dishes[i].left+=n;
  dishes[i].total=Math.max(dishes[i].total,dishes[i].left);
  save();render();
}
function removeDish(i){
  const name=dishes[i].name;
  dishes.splice(i,1);save();render();
  showToast(name+' удалено');
}
function showNewDayModal(){document.getElementById('modalOverlay').classList.add('show')}
function hideModal(){document.getElementById('modalOverlay').classList.remove('show')}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))hideModal()}
function newDayKeep(){save();render();hideModal();showToast('Меню и порции сохранены ☀️')}
function newDayReset(){dishes=dishes.map(d=>({...d,left:0}));save();render();hideModal();showToast('Порции обнулены ☀️')}
function newDayClear(){dishes=[];save();render();hideModal();showToast('Новый день — чистый лист ☀️')}

function render(){
  const el=document.getElementById('dishList');
  if(!dishes.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🥘</div>Добавьте блюда на сегодня</div>';
    return;
  }
  el.innerHTML=dishes.map((d,i)=>{
    const pct=d.total>0?Math.round(d.left/d.total*100):0;
    const bc=pct>60?'g':pct>25?'a':'r';
    const ns=d.left===0?'color:var(--text2);text-decoration:line-through':'';
    const numColor=d.left===0?'color:var(--text2)':bc==='r'?'color:var(--amber)':'';
    const disM1=d.left===0?'disabled style="opacity:0.4"':'';
    const disM2=d.left<2?'disabled style="opacity:0.4"':'';
    return `<div class="dish-card">
      <div class="dish-top">
        <span class="dish-name" style="${ns}">${d.name}</span>
        <button class="dish-del" onclick="removeDish(${i})">✕</button>
      </div>
      <div class="dish-middle">
        <div class="portions-info">
          <span class="p-left" style="${numColor}">${d.left}</span>
          <span class="p-sep">/</span>
          <span class="p-total">${d.total}</span>
          <span class="p-word">порц.</span>
        </div>
        <div class="btns">
          <button class="spend-btn btn-plus5" onclick="restore(${i},5)">+5</button>
          <button class="spend-btn btn-plus1" onclick="restore(${i},1)">+1</button>
          <button class="spend-btn btn-minus1" onclick="spend(${i},1)" ${disM1}>−1</button>
          <button class="spend-btn btn-minus2" onclick="spend(${i},2)" ${disM2}>−2</button>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar ${bc}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
document.getElementById('dishName').addEventListener('keydown',e=>{if(e.key==='Enter')addDish()});
render();
</script>
</body>
</html>
